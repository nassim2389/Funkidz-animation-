{% extends 'base.html' %}

{% block title %}Funkidz - Inscription{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl border-2 border-slate-200 shadow-xl">
        <div class="text-center">
            <h2 class="text-4xl font-black text-transparent bg-gradient-to-r from-blue-600 to-emerald-600 bg-clip-text">Bienvenue ! ✨</h2>
            <p class="mt-2 text-slate-600 font-medium">Rejoignez la famille Funkidz en quelques clics</p>
        </div>
        
        <form class="mt-8 space-y-6" action="{% url 'signup' %}" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-bold text-slate-700 mb-1">Email</label>
                    <input id="email" name="email" type="email" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-blue-400 outline-none transition" placeholder="votre@email.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700 mb-1">Mot de passe</label>
                    <input id="password" name="password" type="password" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-blue-400 outline-none transition" placeholder="••••••••">
                </div>
                <p class="text-xs text-slate-500">En vous inscrivant, vous acceptez nos <a href="#" class="underline">Conditions d'Utilisation</a>.</p>
            </div>

            <button type="submit" class="w-full py-4 bg-gradient-to-r from-blue-600 to-emerald-600 text-white font-bold rounded-xl shadow-lg hover:opacity-90 transition transform hover:scale-[1.02]">
                Créer mon compte
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-slate-600">Déjà un compte ? 
                <a href="{% url 'login' %}" class="font-bold text-purple-600 hover:underline">Connectez-vous ici</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
