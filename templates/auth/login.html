{% extends 'base.html' %}

{% block title %}Funkidz - Connexion{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl border-2 border-slate-200 shadow-xl">
        <div class="text-center">
            <h2 class="text-4xl font-black text-transparent bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text">Bon retour ! 🎉</h2>
            <p class="mt-2 text-slate-600 font-medium">Connectez-vous pour gérer vos réservations</p>
        </div>
        
        <form class="mt-8 space-y-6" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-bold text-slate-700 mb-1">Email</label>
                    <input id="username" name="username" type="email" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-purple-400 outline-none transition" placeholder="votre@email.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-bold text-slate-700 mb-1">Mot de passe</label>
                    <input id="password" name="password" type="password" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-purple-400 outline-none transition" placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-purple-600 rounded">
                    <label for="remember-me" class="ml-2 block text-slate-600">Se souvenir de moi</label>
                </div>
                <a href="#" class="font-bold text-purple-600 hover:text-purple-500">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold rounded-xl shadow-lg hover:opacity-90 transition transform hover:scale-[1.02]">
                Se connecter
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-slate-600">Pas encore de compte ? 
                <a href="{% url 'signup' %}" class="font-bold text-blue-600 hover:underline">Inscrivez-vous ici</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
