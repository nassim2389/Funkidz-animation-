<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Funkidz - Le monde magique des enfants !{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#FFF9F2',
                        foreground: '#2D2424',
                        primary: {
                            DEFAULT: '#FF6B6B',
                            hover: '#FF5252',
                            foreground: '#ffffff',
                        },
                        secondary: {
                            DEFAULT: '#4D96FF',
                            hover: '#3D86EF',
                            foreground: '#ffffff',
                        },
                        accent: {
                            yellow: '#FFD93D',
                            green: '#6BCB77',
                            purple: '#9B72AA',
                        },
                        candy: {
                            pink: '#FF87B2',
                            blue: '#B5DEFF',
                            mint: '#D1FAE5',
                        }
                    },
                    fontFamily: {
                        sans: ['Fredoka', 'sans-serif'],
                        fun: ['Bubblegum Sans', 'cursive'],
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '3rem',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-background text-foreground;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen" x-data="{ atTop: true, scrollPercent: 0 }" 
      @scroll.window="atTop = (window.pageYOffset > 100 ? false : true); scrollPercent = (window.pageYOffset / (document.documentElement.scrollHeight - window.innerHeight)) * 100">
    
    {% include 'includes/cookie_banner.html' %}
    
    <!-- Scroll Progress Bar -->
    <div class="fixed top-0 left-0 h-2 bg-primary z-[100] transition-all duration-300" :style="'width: ' + scrollPercent + '%'"></div>

    <!-- Back to Top Button -->
    <button @click="window.scrollTo({top: 0, behavior: 'smooth'})" 
            x-show="!atTop" 
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-10"
            x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-300"
            x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 translate-y-10"
            class="fixed bottom-10 right-10 z-50 w-16 h-16 bg-white border-4 border-primary text-primary rounded-full shadow-2xl flex items-center justify-center text-3xl hover:bg-primary hover:text-white transition-all transform hover:scale-110 active:scale-95">
        🚀
    </button>
    {% include 'includes/navbar.html' %}

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    {% include 'includes/footer.html' %}

    {% block extra_js %}{% endblock %}
</body>
</html>
